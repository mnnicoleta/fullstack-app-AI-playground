<div class="min-h-screen bg-surface py-8">
    <div class="container mx-auto px-4 max-w-3xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-text">{{ 'products.createNew' | translate }}</h1>
            <p class="mt-2 text-text-muted">{{ 'products.addNewProduct' | translate }}</p>
        </div>

        <!-- Loading State for Categories and Suppliers -->
        @if (loading() && (categories().length === 0 || suppliers().length === 0)) {
            <app-spinner [overlay]="true"></app-spinner>
        }

        <!-- Form -->
        @if (!loading() || (categories().length > 0 && suppliers().length > 0)) {
            <app-card>
                <app-product-form
                    [form]="form"
                    [categories]="categories()"
                    [suppliers]="suppliers()"
                    [isSubmitting]="isSubmitting()"
                    [submitLabel]="'Create Product'"
                    (formSubmit)="onSubmit()"
                    (cancelled)="onCancel()"
                />
            </app-card>
        }
    </div>
</div>
